version: "3.9"

services:
  frontend:
    build:
      context: ./frontend
      target: builder
    command: npm run dev
    volumes:
      - ./frontend/src:/app/src
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      - NODE_ENV=development

  backend:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend/app:/app/app
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  pinchtab:
    image: ghcr.io/pinchtab/pinchtab:0.7.6
    ports:
      - "9867:9867"
